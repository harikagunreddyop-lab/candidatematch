name: Health Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Health Endpoint
        env:
          APP_URL: ${{ vars.APP_URL || 'https://master.d1zctiy8vgnlrr.amplifyapp.com' }}
        run: |
          resp=$(curl -s "${APP_URL}/api/health") || true
          echo "$resp" | head -c 500
          status=$(echo "$resp" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          echo ""
          echo "Status: $status"
          if [ "$status" = "healthy" ] || [ "$status" = "degraded" ]; then
            echo "Health OK"
            exit 0
          fi
          echo "Health check failed"
          exit 1
